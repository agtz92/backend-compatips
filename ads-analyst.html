<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ads Analyst — MatMarkt & Cortina Hawaiana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --border-bright: #2e2e2e;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.1);
    --warn: #f59e0b;
    --danger: #ef4444;
    --matmarkt: #378ADD;
    --cortina: #00d4aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .accounts {
    display: flex;
    gap: 8px;
  }

  .account-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid;
  }

  .badge-matmarkt {
    color: var(--matmarkt);
    border-color: rgba(55,138,221,0.3);
    background: rgba(55,138,221,0.08);
  }

  .badge-cortina {
    color: var(--cortina);
    border-color: rgba(0,212,170,0.3);
    background: rgba(0,212,170,0.08);
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 0 24px;
  }

  .account-selector {
    display: flex;
    gap: 8px;
    padding: 20px 0 0;
  }

  .acc-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .acc-btn:hover { border-color: var(--accent); color: var(--accent); }
  .acc-btn.active-mm { border-color: var(--matmarkt); color: var(--matmarkt); background: rgba(55,138,221,0.08); }
  .acc-btn.active-ch { border-color: var(--cortina); color: var(--cortina); background: rgba(0,212,170,0.08); }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 300px;
    max-height: 55vh;
  }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .msg-icon {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    margin-top: 2px;
  }

  .msg-user .msg-icon { background: var(--border-bright); color: var(--muted); }
  .msg-claude .msg-icon { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,212,170,0.2); }

  .msg-body { flex: 1; }

  .msg-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.06em;
  }

  .msg-text {
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-claude .msg-text { color: #d4d4d4; }

  .msg-text strong { color: var(--accent); font-weight: 500; }
  .msg-text .flag-warn { color: var(--warn); }
  .msg-text .flag-danger { color: var(--danger); }
  .msg-text .flag-ok { color: #4ade80; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }

  .input-area {
    border-top: 1px solid var(--border);
    padding: 16px 0 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    padding: 10px 12px;
    resize: none;
    min-height: 80px;
    max-height: 240px;
    transition: border-color 0.15s;
    outline: none;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 10px 18px;
    cursor: pointer;
    height: 40px;
    white-space: nowrap;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .quick-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .quick-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .status-bar {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 6px 0 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 5px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  /* History panel */
  .history-overlay {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 100;
    flex-direction: column;
    animation: slideIn 0.2s ease;
  }
  .history-overlay.open { display: flex; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  .history-close {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 18px; padding: 4px 8px;
  }
  .history-close:hover { color: var(--text); }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .history-item {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item.selected { border-color: var(--accent); background: var(--accent-dim); }

  .history-item-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .history-item-preview {
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-item-badges {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }

  .history-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    background: var(--accent-dim);
    color: var(--accent);
  }

  .history-actions {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  .history-actions button {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .history-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .history-actions button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Compare view (legacy, kept for side-panel fallback) */
  .compare-view {
    display: none;
    padding: 12px;
    overflow-y: auto;
    flex: 1;
  }
  .compare-view.open { display: block; }
  .delta-pos { color: #4ade80; }
  .delta-neg { color: #ef4444; }

  /* Dashboard overlay */
  .dashboard-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1100;
    background: var(--bg);
    overflow-y: auto;
    padding: 24px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .dashboard-overlay.open { display: block; }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .dash-header h2 {
    font-size: 16px;
    color: var(--accent);
    margin: 0;
    font-weight: 600;
  }
  .dash-header .dash-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .dash-close {
    background: none;
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  .dash-close:hover { border-color: var(--accent); color: var(--accent); }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .kpi-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .kpi-values {
    display: flex;
    gap: 12px;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .kpi-val {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .kpi-val.s1 { color: var(--accent); }
  .kpi-val.s2 { color: var(--matmarkt); }
  .kpi-delta {
    font-size: 13px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .kpi-delta.pos { color: #4ade80; background: rgba(74,222,128,0.1); }
  .kpi-delta.neg { color: #ef4444; background: rgba(239,68,68,0.1); }
  .kpi-delta.zero { color: var(--muted); background: rgba(102,102,102,0.1); }

  /* Bar chart */
  .dash-section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .bar-chart { margin-bottom: 28px; }
  .bar-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
  }
  .bar-label {
    font-size: 11px;
    color: var(--text);
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-pair { display: flex; flex-direction: column; gap: 3px; }
  .bar-track {
    height: 14px;
    border-radius: 3px;
    position: relative;
    display: flex;
    align-items: center;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    min-width: 2px;
    transition: width 0.4s ease;
  }
  .bar-fill.s1 { background: var(--accent); }
  .bar-fill.s2 { background: var(--matmarkt); }
  .bar-value {
    font-size: 9px;
    color: var(--muted);
    margin-left: 6px;
    white-space: nowrap;
  }

  /* Dashboard table */
  .dash-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-bottom: 28px;
  }
  .dash-table th {
    padding: 8px 10px;
    border-bottom: 2px solid var(--border-bright);
    text-align: right;
    color: var(--muted);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .dash-table th:first-child { text-align: left; }
  .dash-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    color: var(--text);
  }
  .dash-table td:first-child { text-align: left; }
  .dash-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* Legend */
  .dash-legend {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    font-size: 11px;
    color: var(--muted);
  }
  .dash-legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
  }

  @media (max-width: 700px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .bar-row { grid-template-columns: 100px 1fr; }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 4px;
    z-index: 200;
    animation: fadeIn 0.2s ease;
  }

  /* Save modal */
  .save-modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
    align-items: center;
    justify-content: center;
  }
  .save-modal-overlay.open { display: flex; }

  .save-modal {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 24px;
    width: 360px;
  }
  .save-modal h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .save-modal label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .save-modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 8px;
    margin-bottom: 12px;
  }
  .save-modal-btns {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .save-modal-btns button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
  }
  .save-modal-btns .save-confirm {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="logo">▸ ADS ANALYST</div>
  <div class="accounts">
    <span class="account-badge badge-matmarkt">MatMarkt 932-342-9199</span>
    <span class="account-badge badge-cortina">Cortina Hawaiana 224-845-1770</span>
    <button class="acc-btn" onclick="toggleHistory()">Historial</button>
  </div>
</header>

<div class="main">

  <div class="account-selector">
    <button class="acc-btn active-mm" id="btn-mm" onclick="setAccount('matmarkt')">MatMarkt</button>
    <button class="acc-btn" id="btn-ch" onclick="setAccount('cortina')">Cortina Hawaiana</button>
    <button class="acc-btn" id="btn-both" onclick="setAccount('both')">Ambas</button>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="input-area">
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickPrompt('weekly')">Pegar reporte semanal</button>
      <button class="quick-btn" onclick="quickPrompt('flags')">¿Hay alertas esta semana?</button>
      <button class="quick-btn" onclick="quickPrompt('vs')">Comparar vs semana anterior</button>
      <button class="quick-btn" onclick="quickPrompt('next')">¿Qué optimizo hoy?</button>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="Pega el reporte aquí, o escribe una pregunta sobre las campañas…" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()">Enviar ↵</button>
      <button class="acc-btn" id="save-btn" onclick="openSaveModal()" style="height:40px;padding:10px 12px" title="Guardar snapshot manual">Guardar</button>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="status-dot"></span>Claude Sonnet 4 · contexto de cuenta cargado</span>
    <span id="status-right">listo</span>
  </div>

</div>

<!-- History Panel -->
<div class="history-overlay" id="history-panel">
  <div class="history-header">
    <span>Historial de Reportes</span>
    <button class="history-close" onclick="toggleHistory()">&times;</button>
  </div>
  <div class="history-list" id="history-list"></div>
  <div class="compare-view" id="compare-view"></div>
  <div class="history-actions">
    <button onclick="viewSnapshot()" id="btn-view-snapshot" disabled>Ver detalle</button>
    <button onclick="compareSnapshots()" id="btn-compare" disabled>Comparar (2)</button>
  </div>
</div>

<!-- Dashboard Overlay -->
<div class="dashboard-overlay" id="dashboard-overlay"></div>

<!-- Save Modal -->
<div class="save-modal-overlay" id="save-modal">
  <div class="save-modal">
    <h3>Guardar Snapshot</h3>
    <label>Fecha del reporte</label>
    <input type="date" id="save-date" />
    <label>Reporte (pega el texto del reporte)</label>
    <textarea id="save-report" style="width:100%;min-height:80px;background:var(--bg);border:1px solid var(--border-bright);border-radius:4px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:8px;margin-bottom:12px;resize:vertical"></textarea>
    <div class="save-modal-btns">
      <button onclick="closeSaveModal()">Cancelar</button>
      <button class="save-confirm" onclick="saveManualSnapshot()">Guardar</button>
    </div>
  </div>
</div>

<script>
var currentAccount = 'matmarkt';
var chatHistory = [];
var selectedSnapshots = [];
var lastReport = '';
var lastAnalysis = '';

var SYSTEM = {
  matmarkt: `Eres el analista de Google Ads de MatMarkt (cuenta 932-342-9199).

CONTEXTO DE LA CUENTA:
MatMarkt vende pisos y tapetes industriales de hule en México. Productos: pisos de hule para gimnasio, tapete en rollo, tatami para artes marciales, tapetes antiderrapantes para albercas/exteriores, tapetes publicitarios personalizados.

BASELINE (reporte 8 de abril 2026, últimos 30 días):
Account totals: 37,534 impr | 2,915 clicks | 7.77% CTR | $41,366.64 cost | 196 conv
NOTA: Conv Rate y Cost/Conv muestran $0 / 0% en el reporte — los Goals de GTM y Ads se actualizaron hoy (8 abril) para verificar funcionalidad. Monitorear si se corrige.

CAMPAÑAS ACTIVAS:
1. Piso Para Gimnasio 2026 (ID: 20803238776) — MAXIMIZE_CONVERSIONS $600/día
   - Cambió de CPC Manual a Maximize Conversions el 8 de abril
   - Presupuesto ajustado el 7 de abril
   - Ad groups nuevos creados el 7 de abril
   - 3 ad groups: General (casi todo el tráfico), Uso Específico CrossFit/Pesas, Loseta/Interlock/Ensamblable
   - 30d: 3,295 impr | 640 clicks | 19.42% CTR | $25,300.21 | 58 conv
   - Keyword principal: "piso para gimnasio" [PHRASE] QS:5 — 2,594 impr, 582 clicks, $23,949, 54 conv
   - Ad groups nuevos (CrossFit y Loseta) aún sin tracción significativa

function quickPrompt(type) {
  var prompts = {
    weekly: 'Aquí está el reporte semanal:\n\n',
    flags: '¿Hay alguna alerta o problema urgente que deba atender esta semana?',
    vs: '¿Cómo estamos comparado con la semana anterior? ¿Qué cambió?',

  };

  document.getElementById('input').focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); send(); }
}

function appendMsg(role, text) {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg msg-' + role;
  var icon = role === 'user' ? 'TÚ' : 'AI';
  var label = role === 'user' ? 'tú' : 'analista';
  div.innerHTML = '<div class="msg-icon">' + icon + '</div>'
    + '<div class="msg-body">'
    + '<div class="msg-label">' + label + '</div>'
    + '<div class="msg-text">' + escHtml(text) + '</div>'
    + '</div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function appendThinking() {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg msg-claude';
  div.id = 'thinking-msg';
  div.innerHTML = '<div class="msg-icon">AI</div>'
    + '<div class="msg-body">'
    + '<div class="msg-label">analista</div>'
    + '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'
    + '</div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  var el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;

  appendMsg('user', text);
  input.value = '';
  input.style.height = 'auto';

  chatHistory.push({ role: 'user', content: text });

  var btn = document.getElementById('send-btn');
  btn.disabled = true;
  document.getElementById('status-right').textContent = 'analizando…';
  appendThinking();

  try {
    var res = await fetch('/ads-analyst/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer zakkdarrell' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM[currentAccount],
        messages: chatHistory,
        account: currentAccount
      })
    });

    var data = await res.json();
    var reply = (data.content && data.content[0] && data.content[0].text)
      ? data.content[0].text
      : 'Error: no se recibió respuesta.';

    removeThinking();
    appendMsg('claude', reply);
    chatHistory.push({ role: 'assistant', content: reply });

    lastReport = text;
    lastAnalysis = reply;

    if (data.snapshot_id) {
      showToast('Snapshot guardado (#' + data.snapshot_id + ')');
    }

  } catch(e) {
    removeThinking();
    appendMsg('claude', 'Error de conexión: ' + e.message);
  }

  btn.disabled = false;
  document.getElementById('status-right').textContent = 'listo';
}

// --- Toast ---
function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

// --- History Panel ---
function toggleHistory() {
  var panel = document.getElementById('history-panel');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    document.getElementById('compare-view').classList.remove('open');
    document.getElementById('compare-view').innerHTML = '';
  } else {
    panel.classList.add('open');
    loadSnapshots();
  }
}

async function loadSnapshots() {
  var list = document.getElementById('history-list');
  list.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:12px">Cargando...</div>';
  selectedSnapshots = [];
  updateHistoryButtons();

  try {
    var res = await fetch('/ads-analyst/api/snapshots?account=' + currentAccount + '&limit=50', {
      headers: { 'Authorization': 'Bearer zakkdarrell' }
    });
    var data = await res.json();
    var snaps = data.snapshots || [];

    if (snaps.length === 0) {
      list.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:12px">No hay snapshots guardados.</div>';
      return;
    }

    list.innerHTML = '';
    snaps.forEach(function(s) {
      var div = document.createElement('div');
      div.className = 'history-item';
      div.dataset.id = s.id;
      div.onclick = function() { toggleSelectSnapshot(s.id, div); };
      div.innerHTML = '<div class="history-item-date">' + s.report_date + ' &middot; ' + s.account_display + '</div>'
        + '<div class="history-item-preview">' + escHtml(s.analysis_preview) + '</div>'
        + '<div class="history-item-badges">'
        + (s.has_metrics ? '<span class="history-badge">metricas</span>' : '')
        + (s.is_auto_saved ? '<span class="history-badge">auto</span>' : '<span class="history-badge">manual</span>')
        + '</div>';
      list.appendChild(div);
    });
  } catch(e) {
    list.innerHTML = '<div style="padding:12px;color:var(--danger);font-size:12px">Error: ' + e.message + '</div>';
  }
}

function toggleSelectSnapshot(id, el) {
  var idx = selectedSnapshots.indexOf(id);
  if (idx >= 0) {
    selectedSnapshots.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    if (selectedSnapshots.length >= 2) {
      var prev = document.querySelector('.history-item[data-id="' + selectedSnapshots[0] + '"]');
      if (prev) prev.classList.remove('selected');
      selectedSnapshots.shift();
    }
    selectedSnapshots.push(id);
    el.classList.add('selected');
  }
  updateHistoryButtons();
}

function updateHistoryButtons() {
  document.getElementById('btn-view-snapshot').disabled = selectedSnapshots.length !== 1;
  document.getElementById('btn-compare').disabled = selectedSnapshots.length !== 2;
}

async function viewSnapshot() {
  if (selectedSnapshots.length !== 1) return;
  var id = selectedSnapshots[0];
  try {
    var res = await fetch('/ads-analyst/api/snapshots/' + id, {
      headers: { 'Authorization': 'Bearer zakkdarrell' }
    });
    var s = await res.json();

    // Show in chat area
    var chat = document.getElementById('chat');
    chat.innerHTML = '';
    appendMsg('user', '[ Snapshot #' + s.id + ' — ' + s.report_date + ' — ' + s.account_display + ' ]\n\n' + s.raw_report);
    if (s.analysis) appendMsg('claude', s.analysis);

    if (s.campaign_metrics && s.campaign_metrics.length > 0) {
      var metricsText = '--- Metricas extraidas ---\n';
      s.campaign_metrics.forEach(function(c) {
        metricsText += '\n' + (c.campaign_name || 'Sin nombre')
          + ': Gasto $' + (c.spend || 0).toLocaleString()
          + ' | Conv: ' + (c.conversions || 0)
          + ' | Costo/Conv: $' + (c.cost_per_conversion || 0).toLocaleString()
          + ' | CTR: ' + (c.ctr || 0) + '%'
          + ' | Clicks: ' + (c.clicks || 0);
      });
      appendMsg('claude', metricsText);
    }

    toggleHistory();
  } catch(e) {
    showToast('Error al cargar snapshot');
  }
}

async function compareSnapshots() {
  if (selectedSnapshots.length !== 2) return;

  try {
    var res = await fetch('/ads-analyst/api/snapshots/compare?id1=' + selectedSnapshots[0] + '&id2=' + selectedSnapshots[1], {
      headers: { 'Authorization': 'Bearer zakkdarrell' }
    });
    var data = await res.json();
    var campaigns = data.campaigns || [];

    if (campaigns.length === 0) {
      showToast('No hay métricas para comparar. Espera a que se extraigan.');
      return;
    }

    // Compute totals
    var totals = { s1: {}, s2: {}, delta: {} };
    var fields = ['spend', 'conversions', 'clicks', 'impressions'];
    fields.forEach(function(f) { totals.s1[f] = 0; totals.s2[f] = 0; });
    campaigns.forEach(function(c) {
      var m1 = c.snapshot_1 || {};
      var m2 = c.snapshot_2 || {};
      fields.forEach(function(f) {
        totals.s1[f] += (m1[f] || 0);
        totals.s2[f] += (m2[f] || 0);
      });
    });
    fields.forEach(function(f) { totals.delta[f] = totals.s2[f] - totals.s1[f]; });
    // Weighted averages for CTR
    totals.s1.ctr = totals.s1.impressions ? (totals.s1.clicks / totals.s1.impressions * 100) : 0;
    totals.s2.ctr = totals.s2.impressions ? (totals.s2.clicks / totals.s2.impressions * 100) : 0;
    totals.delta.ctr = totals.s2.ctr - totals.s1.ctr;
    // Cost per conversion
    totals.s1.cost_per_conversion = totals.s1.conversions ? totals.s1.spend / totals.s1.conversions : 0;
    totals.s2.cost_per_conversion = totals.s2.conversions ? totals.s2.spend / totals.s2.conversions : 0;
    totals.delta.cost_per_conversion = totals.s2.cost_per_conversion - totals.s1.cost_per_conversion;

    var d1 = data.snapshot_1.report_date;
    var d2 = data.snapshot_2.report_date;
    var acct = data.snapshot_1.account === 'cortina' ? 'Cortina Hawaiana' : (data.snapshot_1.account === 'matmarkt' ? 'MatMarkt' : 'Ambas');

    // --- Build dashboard HTML ---
    var html = '';

    // Header
    html += '<div class="dash-header"><div>';
    html += '<h2>' + acct + ' — Comparación</h2>';
    html += '<div class="dash-subtitle">' + d1 + ' vs ' + d2 + '</div>';
    html += '</div>';
    html += '<button class="dash-close" onclick="closeDashboard()">✕ Cerrar</button></div>';

    // Legend
    html += '<div class="dash-legend">';
    html += '<span><span class="dash-legend-dot" style="background:var(--accent)"></span>' + d1 + '</span>';
    html += '<span><span class="dash-legend-dot" style="background:var(--matmarkt)"></span>' + d2 + '</span>';
    html += '</div>';

    // KPI cards
    var kpis = [
      { label: 'Gasto Total', s1: '$' + fmtNum(totals.s1.spend), s2: '$' + fmtNum(totals.s2.spend), delta: totals.delta.spend, prefix: '$', invert: false },
      { label: 'Conversiones', s1: fmtNum(totals.s1.conversions), s2: fmtNum(totals.s2.conversions), delta: totals.delta.conversions, prefix: '', invert: false },
      { label: '$/Conversión', s1: '$' + fmtNum(totals.s1.cost_per_conversion), s2: '$' + fmtNum(totals.s2.cost_per_conversion), delta: totals.delta.cost_per_conversion, prefix: '$', invert: true },
      { label: 'CTR', s1: totals.s1.ctr.toFixed(2) + '%', s2: totals.s2.ctr.toFixed(2) + '%', delta: totals.delta.ctr, prefix: '', invert: false, suffix: '%' },
      { label: 'Clicks', s1: fmtNum(totals.s1.clicks), s2: fmtNum(totals.s2.clicks), delta: totals.delta.clicks, prefix: '', invert: false }
    ];

    html += '<div class="kpi-grid">';
    kpis.forEach(function(k) {
      var dCls = k.delta > 0 ? (k.invert ? 'neg' : 'pos') : (k.delta < 0 ? (k.invert ? 'pos' : 'neg') : 'zero');
      var sign = k.delta > 0 ? '+' : '';
      var suffix = k.suffix || '';
      html += '<div class="kpi-card">';
      html += '<div class="kpi-label">' + k.label + '</div>';
      html += '<div class="kpi-values"><span class="kpi-val s1">' + k.s1 + '</span><span class="kpi-val s2">' + k.s2 + '</span></div>';
      html += '<span class="kpi-delta ' + dCls + '">' + sign + k.prefix + fmtNum(Math.abs(k.delta)) + suffix + '</span>';
      html += '</div>';
    });
    html += '</div>';

    // Bar chart — spend per campaign
    html += '<div class="bar-chart">';
    html += '<div class="dash-section-title">Gasto por Campaña</div>';
    var maxSpend = 0;
    campaigns.forEach(function(c) {
      var v1 = (c.snapshot_1 || {}).spend || 0;
      var v2 = (c.snapshot_2 || {}).spend || 0;
      if (v1 > maxSpend) maxSpend = v1;
      if (v2 > maxSpend) maxSpend = v2;
    });
    if (maxSpend === 0) maxSpend = 1;
    campaigns.forEach(function(c) {
      var v1 = (c.snapshot_1 || {}).spend || 0;
      var v2 = (c.snapshot_2 || {}).spend || 0;
      var w1 = (v1 / maxSpend * 100).toFixed(1);
      var w2 = (v2 / maxSpend * 100).toFixed(1);
      html += '<div class="bar-row">';
      html += '<div class="bar-label">' + escHtml(c.campaign_name) + '</div>';
      html += '<div class="bar-pair">';
      html += '<div class="bar-track"><div class="bar-fill s1" style="width:' + w1 + '%"></div><span class="bar-value">$' + fmtNum(v1) + '</span></div>';
      html += '<div class="bar-track"><div class="bar-fill s2" style="width:' + w2 + '%"></div><span class="bar-value">$' + fmtNum(v2) + '</span></div>';
      html += '</div></div>';
    });
    html += '</div>';

    // Detailed table
    html += '<div class="dash-section-title">Detalle por Campaña</div>';
    html += '<table class="dash-table"><tr><th>Campaña</th><th>Gasto</th><th>Conv</th><th>$/Conv</th><th>CTR</th><th>Clicks</th><th>Impresiones</th></tr>';
    campaigns.forEach(function(c) {
      var m1 = c.snapshot_1 || {};
      var m2 = c.snapshot_2 || {};
      var d = c.delta || {};
      html += '<tr>';
      html += '<td>' + escHtml(c.campaign_name) + '</td>';
      html += '<td>$' + fmtNum(m1.spend || 0) + ' → $' + fmtNum(m2.spend || 0) + ' ' + fmtDelta(d.spend, '$') + '</td>';
      html += '<td>' + fmtNum(m1.conversions || 0) + ' → ' + fmtNum(m2.conversions || 0) + ' ' + fmtDelta(d.conversions) + '</td>';
      html += '<td>' + fmtDelta(d.cost_per_conversion, '$', true) + '</td>';
      html += '<td>' + fmtDelta(d.ctr, '', false, '%') + '</td>';
      html += '<td>' + fmtNum(m1.clicks || 0) + ' → ' + fmtNum(m2.clicks || 0) + ' ' + fmtDelta(d.clicks) + '</td>';
      html += '<td>' + fmtNum(m1.impressions || 0) + ' → ' + fmtNum(m2.impressions || 0) + '</td>';
      html += '</tr>';
    });
    html += '</table>';

    // Render
    var overlay = document.getElementById('dashboard-overlay');
    overlay.innerHTML = html;
    overlay.classList.add('open');
    // Close history panel
    document.getElementById('history-panel').classList.remove('open');

  } catch(e) {
    showToast('Error al comparar: ' + e.message);
  }
}

function closeDashboard() {
  var overlay = document.getElementById('dashboard-overlay');
  overlay.classList.remove('open');
  overlay.innerHTML = '';
}

function fmtNum(n) {
  if (n === undefined || n === null) return '0';
  return Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function fmtDelta(val, prefix, invert, suffix) {
  if (val === undefined || val === null) return '-';
  prefix = prefix || '';
  suffix = suffix || '';
  var cls = val > 0 ? (invert ? 'delta-neg' : 'delta-pos') : (val < 0 ? (invert ? 'delta-pos' : 'delta-neg') : '');
  var sign = val > 0 ? '+' : '';
  return '<span class="' + cls + '">' + sign + prefix + fmtNum(Math.abs(val)) + suffix + '</span>';
}

// --- Save Modal ---
function openSaveModal() {
  document.getElementById('save-date').value = new Date().toISOString().split('T')[0];
  var reportField = document.getElementById('save-report');
  // Pre-fill with last report if available
  reportField.value = lastReport || '';
  document.getElementById('save-modal').classList.add('open');
}

function closeSaveModal() {
  document.getElementById('save-modal').classList.remove('open');
}

async function saveManualSnapshot() {
  var reportDate = document.getElementById('save-date').value;
  var rawReport = document.getElementById('save-report').value.trim();
  if (!rawReport) {
    showToast('Escribe o pega el reporte');
    return;
  }

  try {
    var res = await fetch('/ads-analyst/api/snapshots', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer zakkdarrell' },
      body: JSON.stringify({
        account: currentAccount,
        report_date: reportDate,
        raw_report: rawReport,
        analysis: lastAnalysis || ''
      })
    });
    var data = await res.json();
    if (data.id) {
      showToast('Snapshot #' + data.id + ' guardado');
      closeSaveModal();
    } else {
      showToast('Error: ' + (data.error || 'desconocido'));
    }
  } catch(e) {
    showToast('Error: ' + e.message);
  }
}
